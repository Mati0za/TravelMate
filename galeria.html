<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelMate - Galeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22%3E%3Ctext%20y=%22.9em%22%20font-size=%2290%22%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-item {
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }
        .fade-in {
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">✈️ TravelMate</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Start</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Moje Podróże</a></li>
                    <li class="nav-item"><a class="nav-link" href="kalkulator.html">Kalkulator</a></li>
                    <li class="nav-item"><a class="nav-link active" href="galeria.html">Galeria</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-2 px-4" href="kontakt.html">Zaplanuj</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Wspomnienia z podróży</h1>
            <p class="text-muted">Przeglądaj zdjęcia według kategorii.</p>
            
            <div class="btn-group mt-3" role="group" aria-label="Filtry galerii">
                <button type="button" class="btn btn-outline-dark active filter-btn" data-filter="all">Wszystkie</button>
                <button type="button" class="btn btn-outline-dark filter-btn" data-filter="gory">Góry</button>
                <button type="button" class="btn btn-outline-dark filter-btn" data-filter="plaza">Plaża</button>
                <button type="button" class="btn btn-outline-dark filter-btn" data-filter="miasto">Miasto</button>
            </div>
        </div>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="galleryGrid">
            <div class="col gallery-col" data-category="gory">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                         class="card-img-top gallery-item rounded" alt="Góry"
                         onclick="openModal(this)">
                </div>
            </div>
            <div class="col gallery-col" data-category="plaza">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                         class="card-img-top gallery-item rounded" alt="Plaża"
                         onclick="openModal(this)">
                </div>
            </div>
            <div class="col gallery-col" data-category="miasto">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                         class="card-img-top gallery-item rounded" alt="Miasto"
                         onclick="openModal(this)">
                </div>
            </div>
            <div class="col gallery-col" data-category="gory">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1486870591958-9b9d0d1dda99?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                         class="card-img-top gallery-item rounded" alt="Góry"
                         onclick="openModal(this)">
                </div>
            </div>
            <div class="col gallery-col" data-category="miasto">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                         class="card-img-top gallery-item rounded" alt="Nowy Jork"
                         onclick="openModal(this)">
                </div>
            </div>
             <div class="col gallery-col" data-category="plaza">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1519046904884-53103b34b206?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                         class="card-img-top gallery-item rounded" alt="Plaża"
                         onclick="openModal(this)">
                </div>
            </div>
        </div>
    </main>
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body p-0 text-center position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" id="modalImage" class="img-fluid rounded shadow-lg" alt="Powiększenie">
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 TravelMate. Mateusz Szlachetka 104508</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
