<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelMate - Dodaj nową podróż</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22%3E%3Ctext%20y=%22.9em%22%20font-size=%2290%22%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">✈️ TravelMate</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Start</a></li>
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Moje Podróże</a></li>
                    <li class="nav-item"><a class="nav-link" href="kalkulator.html">Kalkulator</a></li>
                    <li class="nav-item"><a class="nav-link" href="galeria.html">Galeria</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-2 px-4" href="kontakt.html">Kontakt</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h1 class="h4 mb-0">🌍 Zaplanuj nową podróż</h1>
                    </div>
                    <div class="card-body p-4"> 
                        <form id="addTripForm" novalidate>
                            <div class="mb-3">
                                <label for="newCity" class="form-label">Kierunek (Miasto, Kraj)</label>
                                <input type="text" class="form-control" id="newCity" placeholder="np. Rzym, Włochy" required>
                                <div class="invalid-feedback">To pole jest wymagane.</div>
                            </div>
                            <div class="mb-3">
                                <label for="newDate" class="form-label">Data wyjazdu</label>
                                <input type="date" class="form-control" id="newDate" required>
                            </div>
                            <div class="mb-3">
                                <label for="newBudget" class="form-label">Planowany budżet</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="newBudget" placeholder="np. 2500" required>
                                    <span class="input-group-text">PLN</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between mt-4">
                                <a href="dashboard.html" class="btn btn-outline-secondary">Anuluj</a>
                                <button type="submit" class="btn btn-primary px-4">Zapisz podróż</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 TravelMate. Mateusz Szlachetka 104508</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
